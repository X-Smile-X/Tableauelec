name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      # (Optionnel) Vous pouvez supprimer l'étape suivante si vous préférez, 
      # le wrapper va gérer la version de Gradle.
      - name: Installer Gradle (facultatif)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Rendre le wrapper Gradle exécutable
        run: chmod +x ./gradlew

      - name: Accepter les licences Android SDK (rapide)
        run: |
          yes | sdkmanager --licenses || true

      - name: (Optionnel) Installer composants SDK requis
        # Décommentez et ajustez la version si votre project nécessite une API / build-tools précise
        run: |
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" || true

      - name: Compiler l'APK debug (Gradle wrapper)
        run: gradle assembleDebug --no-daemon --stacktrace --info

      - name: Publier l'APK généré
        uses: actions/upload-artifact@v4
        with:
          name: tableau-electrique-apk
          path: app/build/outputs/apk/debug/app-debug.apk
