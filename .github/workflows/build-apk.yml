name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      # (Optionnel) Vous pouvez supprimer l'étape suivante si vous préférez, 
      # le wrapper va gérer la version de Gradle.
      - name: Installer Gradle (facultatif)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Rendre le wrapper Gradle exécutable si présent
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            echo "Found gradlew, made it executable"
          else
            echo "No gradlew found in repository; will use system gradle if available"
          fi

      - name: Accepter les licences Android SDK (rapide)
        run: |
          yes | sdkmanager --licenses || true

      - name: (Optionnel) Installer composants SDK requis
        # Décommentez et ajustez la version si votre project nécessite une API / build-tools précise
        run: |
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" || true

      - name: Compiler l'APK debug (utilise gradle wrapper si présent)
        run: |
          # Detecter le répertoire du projet contenant un build Gradle
          if [ -f ./settings.gradle ] || [ -f ./settings.gradle.kts ] || [ -f ./build.gradle ] || [ -f ./build.gradle.kts ]; then
            PROJECT_DIR="."
          elif [ -d ./app ] && ( [ -f ./app/settings.gradle ] || [ -f ./app/settings.gradle.kts ] || [ -f ./app/build.gradle ] || [ -f ./app/build.gradle.kts ] ); then
            PROJECT_DIR="./app"
          else
            echo "Aucun fichier de build Gradle trouvé à la racine ni dans ./app. Ajoutez settings.gradle et le Gradle wrapper ou ajustez le workflow."
            exit 1
          fi
          echo "Using project dir: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          if [ -f ./gradlew ]; then
            ./gradlew assembleDebug --no-daemon --stacktrace --info
          elif command -v gradle >/dev/null 2>&1; then
            gradle assembleDebug --no-daemon --stacktrace --info
          else
            echo "Ni gradlew ni gradle système non trouvés. Ajoutez le Gradle wrapper au dépôt ou installez Gradle dans l'environnement."
            exit 1
          fi

      - name: Publier l'APK généré
        uses: actions/upload-artifact@v4
        with:
          name: tableau-electrique-apk
          path: app/build/outputs/apk/debug/app-debug.apk
